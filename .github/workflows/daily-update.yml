name: Daily dashboard update

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh dashboard data
        run: npm run update
        env:
          GRANT_FEED_URL: ${{ secrets.GRANT_FEED_URL }}

      - name: Commit updated data
        run: |
          if ! git diff --quiet -- data/grants.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/grants.json
            git commit -m "Update grant dashboard data"
            git push
          fi
